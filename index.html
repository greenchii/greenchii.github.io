<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>我的博客</title>
    <meta name="description" content="一个基于 GitHub Pages 的静态个人博客。" />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到内容</a>

    <header class="site-header">
      <div class="container header-row">
        <div class="brand">
          <a class="brand-title" href="./index.html">我的博客</a>
          <p class="brand-subtitle">记录学习与生活</p>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="btn" type="button" aria-label="切换主题">
            主题
          </button>
          <a class="btn btn-ghost" href="https://github.com/" target="_blank" rel="noreferrer">
            GitHub
          </a>
        </div>
      </div>
    </header>

    <main id="main" class="container">
      <section class="hero">
        <h1>你好，我是 <span class="accent">你自己</span></h1>
        <p class="muted">
          这是一个可以直接上传到 GitHub Pages 的静态博客：用 Markdown 写文章，自动在网页里渲染。
        </p>
      </section>

      <section class="panel">
        <div class="panel-row">
          <h2 class="panel-title">文章</h2>
          <div class="panel-actions">
            <button id="newPostBtn" class="btn" type="button" aria-label="新建文章">+ 新建文章</button>
            <input
              id="searchInput"
              class="input"
              type="search"
              placeholder="搜索标题/标签…"
              autocomplete="off"
              aria-label="搜索文章"
            />
          </div>
        </div>
        <div id="postsMeta" class="muted small"></div>
        <div id="postsList" class="posts-list" aria-live="polite"></div>
      </section>

      <!-- 新建/编辑文章模态框 -->
      <div id="postModal" class="modal" style="display: none;">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-dialog">
          <div class="modal-header">
            <h2 id="modalTitle">新建文章</h2>
            <button id="modalClose" class="btn-close" type="button" aria-label="关闭">×</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label for="postTitleInput">标题</label>
              <input
                id="postTitleInput"
                class="input"
                type="text"
                placeholder="输入文章标题…"
              />
            </div>
            <div class="form-group">
              <label for="postExcerptInput">摘要（可选）</label>
              <input
                id="postExcerptInput"
                class="input"
                type="text"
                placeholder="输入文章摘要…"
              />
            </div>
            <div class="form-group">
              <label for="postContentInput">内容</label>
              <textarea
                id="postContentInput"
                class="input textarea"
                placeholder="输入文章内容…"
                rows="12"
              ></textarea>
            </div>
            <div class="form-group">
              <label for="postTagsInput">标签（用逗号分隔）</label>
              <input
                id="postTagsInput"
                class="input"
                type="text"
                placeholder="例如：随笔, 技术"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button id="modalCancel" class="btn btn-ghost" type="button">取消</button>
            <button id="modalSave" class="btn" type="button">保存</button>
          </div>
        </div>
      </div>

      <section class="panel">
        <h2 class="panel-title">关于我</h2>
        <p class="muted">
          在这里写一段自我介绍。你也可以把社交链接放到页脚。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <p class="muted small">© <span id="year"></span> 我的博客 · Powered by GitHub Pages</p>
        <p class="muted small">
          <a href="./rss.xml">RSS</a>
          <span class="sep">·</span>
          <a href="./sitemap.xml">Sitemap</a>
        </p>
      </div>
    </footer>

    <script src="./assets/main.js" defer></script>
  </body>
</html>
