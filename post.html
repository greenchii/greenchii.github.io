<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>文章 - 我的博客</title>
    <meta name="description" content="博客文章详情页" />
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到内容</a>

    <header class="site-header">
      <div class="container header-row">
        <div class="brand">
          <a class="brand-title" href="./index.html">我的博客</a>
          <p class="brand-subtitle">文章</p>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="btn" type="button" aria-label="切换主题">
            主题
          </button>
          <a class="btn btn-ghost" href="./index.html">返回首页</a>
        </div>
      </div>
    </header>

    <main id="main" class="container">
      <article class="panel article">
        <header class="article-header">
          <h1 id="postTitle" class="article-title">加载中…</h1>
          <div class="article-meta">
            <span id="postDate" class="badge">—</span>
            <span id="postTags" class="tags"></span>
          </div>
        </header>

        <div id="postBody" class="markdown" aria-live="polite"></div>

        <footer class="article-footer">
          <a class="btn btn-ghost" href="./index.html">← 所有文章</a>
          <div class="article-actions">
            <button id="editPostBtn" class="btn" type="button">编辑</button>
            <button id="deletePostBtn" class="btn" type="button">删除</button>
          </div>
        </footer>
      </article>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <p class="muted small">© <span id="year"></span> 我的博客</p>
        <p class="muted small"><a href="./index.html">首页</a></p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js" defer></script>
    <script src="./assets/main.js" defer></script>

    <!-- 编辑文章模态框 -->
    <div id="postModal" class="modal" style="display: none;">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="modalTitle">编辑文章</h2>
          <button id="modalClose" class="btn-close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="postTitleInput">标题</label>
            <input
              id="postTitleInput"
              class="input"
              type="text"
              placeholder="输入文章标题…"
            />
          </div>
          <div class="form-group">
            <label for="postExcerptInput">摘要（可选）</label>
            <input
              id="postExcerptInput"
              class="input"
              type="text"
              placeholder="输入文章摘要…"
            />
          </div>
          <div class="form-group">
            <label for="postContentInput">内容</label>
            <textarea
              id="postContentInput"
              class="input textarea"
              placeholder="输入文章内容…"
              rows="12"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="postTagsInput">标签（用逗号分隔）</label>
            <input
              id="postTagsInput"
              class="input"
              type="text"
              placeholder="例如：随笔, 技术"
            />
          </div>
        </div>
        <div class="modal-footer">
          <button id="modalCancel" class="btn btn-ghost" type="button">取消</button>
          <button id="modalSave" class="btn" type="button">保存</button>
        </div>
      </div>
    </div>
  </body>
</html>
